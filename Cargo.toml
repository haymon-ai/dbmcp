[workspace]
members = [
    ".",
    "crates/core",
    "crates/backend",
    "crates/mysql",
    "crates/postgres",
    "crates/sqlite",
    "crates/server",
    "crates/sqlx-to-json",
]

[workspace.dependencies]
# Shared across multiple crates
sqlx = { version = "0.8", features = ["runtime-tokio", "runtime-tokio-rustls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
base64 = "0.22"
clap = { version = "4", features = ["derive", "env"] }
sqlparser = { version = "0.61", features = ["visitor"] }
moka = { version = "0.12", features = ["future"] }

# Internal workspace crates
core = { path = "crates/core", package = "mcp-core" }
backend = { path = "crates/backend", package = "backend" }
mysql = { path = "crates/mysql", package = "mysql" }
postgres = { path = "crates/postgres", package = "postgres" }
sqlite = { path = "crates/sqlite", package = "sqlite" }
server = { path = "crates/server", package = "server" }
sqlx-to-json = { path = "crates/sqlx-to-json", package = "sqlx-to-json" }

[workspace.lints.rust]
ambiguous_negative_literals = "warn"
missing_debug_implementations = "warn"
redundant_imports = "warn"
redundant_lifetimes = "warn"
trivial_numeric_casts = "warn"
unsafe_op_in_unsafe_fn = "warn"
unused_lifetimes = "warn"

[workspace.lints.clippy]
complexity = { level = "warn", priority = -1 }
correctness = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
suspicious = { level = "warn", priority = -1 }
# Suppress pedantic lints that don't apply to this project
multiple_crate_versions = "allow"          # Transitive deps, not our control
struct_excessive_bools = "allow"           # Config struct legitimately has SSL bools
module_name_repetitions = "allow"          # e.g. db::backend::DatabaseBackend is fine

[package]
name = "database-mcp"
version = "0.3.1"
edition = "2024"
description = "A single-binary MCP server for MySQL, PostgreSQL, and SQLite"
license = "MIT"
repository = "https://github.com/haymon-ai/database-mcp"
keywords = ["mcp", "database", "mysql", "postgresql", "sqlite"]
categories = ["database", "command-line-utilities"]

[dependencies]
mcp_core = { path = "crates/core", package = "mcp-core" }
backend = { workspace = true }
mysql = { workspace = true }
postgres = { workspace = true }
sqlite = { workspace = true }
server = { workspace = true }
rmcp = { version = "1.3", features = ["server", "macros", "transport-io", "transport-streamable-http-server"] }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
clap = { workspace = true }
axum = "0.8"
tower-http = { version = "0.6", features = ["cors"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_json = { workspace = true }
sqlparser = { workspace = true }
mimalloc = "0.1"

[lints]
workspace = true

[[test]]
name = "mysql"
path = "tests/mysql/mysql.rs"

[[test]]
name = "postgres"
path = "tests/postgres/postgres.rs"

[[test]]
name = "sqlite"
path = "tests/sqlite/sqlite.rs"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
