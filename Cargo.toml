[package]
name = "sql-mcp"
version = "0.1.0"
edition = "2024"
description = "A single-binary MCP server for MySQL, PostgreSQL, and SQLite"
license = "MIT"
repository = "https://github.com/athopen/sql-mcp"
keywords = ["mcp", "database", "mysql", "postgresql", "sqlite"]
categories = ["database", "command-line-utilities"]

[dependencies]
rmcp = { version = "1.2", features = ["server", "macros", "transport-io", "transport-streamable-http-server"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "runtime-tokio-rustls", "mysql", "postgres", "sqlite"] }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
clap = { version = "4", features = ["derive", "env"] }
axum = "0.8"
tower-http = { version = "0.6", features = ["cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlparser = { version = "0.61", features = ["visitor"] }
thiserror = "2"
moka = { version = "0.12", features = ["future"] }
mimalloc = "0.1"

[lints.rust]
ambiguous_negative_literals = "warn"
missing_debug_implementations = "warn"
redundant_imports = "warn"
redundant_lifetimes = "warn"
trivial_numeric_casts = "warn"
unsafe_op_in_unsafe_fn = "warn"
unused_lifetimes = "warn"

[lints.clippy]
complexity = { level = "warn", priority = -1 }
correctness = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
suspicious = { level = "warn", priority = -1 }
# Suppress pedantic lints that don't apply to this project
multiple_crate_versions = "allow"          # Transitive deps, not our control
struct_excessive_bools = "allow"           # Config struct legitimately has SSL bools
module_name_repetitions = "allow"          # e.g. db::backend::DatabaseBackend is fine

[[test]]
name = "mysql"
path = "tests/mysql/mysql.rs"

[[test]]
name = "postgres"
path = "tests/postgres/postgres.rs"

[[test]]
name = "sqlite"
path = "tests/sqlite/sqlite.rs"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
