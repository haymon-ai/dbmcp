name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: cocogitto/cocogitto-action@v4
        with:
          install-only: true

      - name: Check conventional commits
        run: |
          # Find latest tag (including pre-release) reachable from HEAD
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            echo "Checking commits from $LATEST_TAG to HEAD"
            cog check "$LATEST_TAG..HEAD"
          else
            echo "No tags found, checking all commits"
            cog check
          fi

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib

  mariadb:
    name: MariaDB
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mariadb:
        image: mariadb:12
        env:
          MARIADB_ROOT_HOST: '%'
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
          MARIADB_DATABASE: mcp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -u root --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Seed database
        run: docker exec -i ${{ job.services.mariadb.id }} mariadb -u root mcp < tests/mysql/setup.sql
      - run: cargo test --test mysql -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306

  mysql:
    name: MySQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_HOST: '%'
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: mcp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u root --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Seed database
        run: docker exec -i ${{ job.services.mysql.id }} mysql -u root mcp < tests/mysql/setup.sql
      - run: cargo test --test mysql -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306

  postgres:
    name: PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: mcp
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Seed database
        run: docker exec -i ${{ job.services.postgres.id }} psql -U postgres -d mcp < tests/postgres/setup.sql
      - run: cargo test --test postgres -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432

  sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test sqlite -- --test-threads=1
        env:
          DB_PATH: /tmp/mcp_test.db
