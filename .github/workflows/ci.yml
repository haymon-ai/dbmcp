name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  commits:
    name: Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: cocogitto/cocogitto-action@v4
        with:
          command: check
          args: --from-latest-tag

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  taplo:
    name: Taplo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: uncenter/setup-taplo@v1
        with:
          version: "0.9.3"
      - run: taplo fmt --check --diff

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --tests -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib

  mariadb:
    name: MariaDB
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mariadb:
        image: mariadb:12
        env:
          MARIADB_ROOT_HOST: '%'
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -u root --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Seed database
        run: docker exec -i ${{ job.services.mariadb.id }} mariadb -u root < tests/seed/mysql.sql
      - name: Approval tests
        run: cargo test --test approval_mysql -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
      - name: Functional tests
        run: cargo test --test functional_mysql -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306

  mysql:
    name: MySQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:9
        env:
          MYSQL_ROOT_HOST: '%'
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u root --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Seed database
        run: docker exec -i ${{ job.services.mysql.id }} mysql -u root < tests/seed/mysql.sql
      - name: Approval tests
        run: cargo test --test approval_mysql -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
      - name: Functional tests
        run: cargo test --test functional_mysql -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306

  postgres:
    name: PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Seed database
        run: docker exec -i ${{ job.services.postgres.id }} psql -U postgres < tests/seed/postgres.sql
      - name: Approval tests
        run: cargo test --test approval_postgres -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
      - name: Functional tests
        run: cargo test --test functional_postgres -- --test-threads=1
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432

  sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Seed database
        run: sqlite3 /tmp/app.db < tests/seed/sqlite.sql
      - name: Approval tests
        run: cargo test --test approval_sqlite -- --test-threads=1
        env:
          DB_PATH: /tmp/app.db
      - name: Functional tests
        run: cargo test --test functional_sqlite -- --test-threads=1
        env:
          DB_PATH: /tmp/app.db
